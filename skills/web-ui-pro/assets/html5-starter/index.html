<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starter</title>
  <style>
    :root{--bg:#0b1020;--panel:#131a2e;--text:#eaf0ff;--muted:#9fb0d3;--line:#2b3550}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1000px;margin:0 auto;padding:24px}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Título da Página</h1>
      <p style="color:var(--muted)">Base inicial para layout profissional.</p>
    </section>
  </main>
</body>
</html>
